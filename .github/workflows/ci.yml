name: AGENTROPOLIS Node CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-validate:
    name: Validate Node Stack
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Validate docker-compose
        run: docker compose config --quiet

      - name: Validate MCP config
        run: |
          jq . mcp/mcp-config.json > /dev/null
          echo "✓ mcp-config.json valid"

      - name: Validate .env.example
        run: |
          test -f .env.example && echo "✓ .env.example exists"

      - name: Check install script is executable
        run: |
          test -f scripts/install.sh && echo "✓ install.sh exists"

      - name: Validate Solidity (basic syntax)
        run: |
          grep -q "pragma solidity" contracts/XentsProtocol.sol && echo "✓ Contract found"
          grep -q "XentsProtocol" contracts/XentsProtocol.sol && echo "✓ Contract named correctly"

      - name: Lint relay.js
        working-directory: node
        run: |
          npm install --quiet
          node --check src/relay.js && echo "✓ relay.js syntax valid"
          node --check monitor/index.js && echo "✓ monitor/index.js syntax valid"
